name: TDTFlow CI

on:
  push:
    branches: [ master, develop, develop_last_ok ]
    tags: ['v*']
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Single source of truth for the mock — reused in every job that needs it
  MOCK_GOOGLE_SERVICES: >-
    {"project_info":{"project_number":"0","project_id":"tdtflow-mock","storage_bucket":"dummy.appspot.com"},
    "client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":
    {"package_name":"com.pedrogm.tdtflow"}},"api_key":[{"current_key":"dummy"}]}]}

# ─────────────────────────────────────────────────────────────────────────────
# lint  and  unit-tests  run in parallel.
# instrumented-tests  runs in parallel on push events (emulator is slow/flaky
#   on PR workflows — keeps PR feedback fast).
# build-release  waits for lint + unit-tests and only triggers on deployable refs.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Static analysis ──────────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Codacy needs full history

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Create Mock Google Services
        run: echo "$MOCK_GOOGLE_SERVICES" > app/google-services.json

      - name: Run Android Lint
        run: ./gradlew lintDebug -Pandroid.lint.abortOnError=false

      # Always upload report so failures are inspectable in the Actions UI
      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: warn

      - name: Run Codacy Analysis
        uses: codacy/codacy-analysis-cli-action@v4
        continue-on-error: true   # External service — never blocks the pipeline
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: ${{ runner.temp }}/results.sarif
          format: sarif
          upload: true
          directory: ${{ github.workspace }}

  # ── 2. JVM unit tests (app + domain + data) ─────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Create Mock Google Services
        run: echo "$MOCK_GOOGLE_SERVICES" > app/google-services.json

      # --continue: run every module even if one fails, so all failures surface
      - name: Run Unit Tests
        run: ./gradlew test --continue

      # JUnit XML results → visible in the Actions test summary on failure
      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/build/test-results/**/TEST-*.xml'
          if-no-files-found: warn

  # ── 3. Compose UI / instrumented tests (push only — emulator is slow) ───────
  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    # Skip on pull_request to keep PR checks fast; runs on every push
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      # Required for hardware-accelerated emulator on GitHub-hosted runners
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Mock Google Services
        run: echo "$MOCK_GOOGLE_SERVICES" > app/google-services.json

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29        # Lowest API with stable Compose support; above minSdk 24
          target: default
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest --continue

      - name: Upload Instrumented Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/outputs/androidTest-results/
          if-no-files-found: warn

  # ── 4. Release bundle (deployable refs only) ─────────────────────────────────
  build-release:
    name: Build Release
    needs: [ lint, unit-tests ]
    # Run only when both gates pass AND we are on a deployable ref
    if: |
      !cancelled() &&
      needs.lint.result == 'success' &&
      needs.unit-tests.result == 'success' &&
      (
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/develop' ||
        github.ref == 'refs/heads/develop_last_ok' ||
        startsWith(github.ref, 'refs/tags/v')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Create Google Services
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "$MOCK_GOOGLE_SERVICES" > app/google-services.json
          fi

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          if [ -z "$ENCODED_KEYSTORE" ]; then
            echo "::error::Secret RELEASE_KEYSTORE is not set. Cannot sign the release bundle."
            exit 1
          fi
          echo "$ENCODED_KEYSTORE" | base64 --decode > app/release.jks

      - name: Build Release Bundle
        env:
          RELEASE_KEYSTORE_PATH: release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab

name: TDTFlow CI & Quality Pipeline

on:
  push:
    branches: [ master, develop, develop_last_ok ]
    tags: ['v*']
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MOCK_GOOGLE_SERVICES: >-
    {"project_info":{"project_number":"0","project_id":"tdtflow-mock",
    "storage_bucket":"dummy.appspot.com"},"client":[{"client_info":
    {"mobilesdk_app_id":"1:0:android:0","android_client_info":
    {"package_name":"com.pedrogm.tdtflow"}},"api_key":[{"current_key":"dummy"}]}]}

jobs:
  # ── 1. Calidad y Seguridad (Codacy + Lint) ──────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codacy Analysis
        uses: codacy/codacy-analysis-cli-action@v4
        continue-on-error: true
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: ${{ runner.temp }}/results.sarif
          format: sarif
          upload: true
          directory: ${{ github.workspace }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create Mock Google Services
        run: echo "$MOCK_GOOGLE_SERVICES" > app/google-services.json

      - name: Run Android Lint
        run: bash gradlew lintDebug -Pandroid.lint.abortOnError=false

  # ── 2. Tests y Cobertura ────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests & Coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - uses: gradle/actions/setup-gradle@v4
      
      - name: Create Mock Google Services
        run: echo "$MOCK_GOOGLE_SERVICES" > app/google-services.json

      - name: Run Unit Tests with Coverage
        run: bash gradlew jacocoTestReport

      - name: Upload Coverage to Codacy
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            -l Kotlin \
            -r build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

  # ── 3. Generación de Bundle de Release ──────────────────────────────────
  build-release:
    name: Build Release
    needs: [ lint, unit-tests ]
    if: |
      always() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.unit-tests.result == 'success') &&
      (
        github.ref == 'refs/heads/master' || 
        github.ref == 'refs/heads/develop' || 
        github.ref == 'refs/heads/develop_last_ok' || 
        startsWith(github.ref, 'refs/tags/v')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      - name: Create Google Services
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "$MOCK_GOOGLE_SERVICES" > app/google-services.json
          fi

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          if [ -z "$ENCODED_STRING" ]; then
            echo "::error::Secret RELEASE_KEYSTORE is missing."
            exit 1
          fi
          echo "$ENCODED_STRING" | base64 --decode > app/release.jks

      - name: Build Release Bundle
        env:
          RELEASE_KEYSTORE_PATH: release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: bash gradlew bundleRelease

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab
